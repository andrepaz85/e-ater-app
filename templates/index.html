<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-ATER Agroecologia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { user-select: none; -webkit-user-select: none; touch-action: manipulation; background-color: #f0fdf4; font-family: sans-serif; }
        .botao-gigante { transition: transform 0.1s, filter 0.2s; }
        .botao-gigante:active { transform: scale(0.95); filter: brightness(0.9); }
        .gravando { animation: piscar 1s infinite; background-color: #ef4444 !important; }
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 flex flex-col items-center text-center border-t-4 border-green-700">
        <h1 class="text-3xl font-bold text-green-800 mb-2">🌿 e-ATER</h1>
        <p class="text-gray-600 mb-8 font-medium">Agroecologia Digital</p>

        <label for="input-camera" class="botao-gigante w-full bg-green-600 text-white rounded-2xl py-10 mb-6 shadow-lg flex flex-col items-center justify-center cursor-pointer">
            <i class="fas fa-camera text-6xl mb-3"></i>
            <span class="text-2xl font-bold" id="texto-foto">TIRAR FOTO</span>
            <input type="file" id="input-camera" accept="image/*" capture="environment" class="hidden" onchange="fotoTirada()">
        </label>

        <button id="btn-gravar" class="botao-gigante w-full bg-yellow-500 text-white rounded-2xl py-10 shadow-lg flex flex-col items-center justify-center">
            <i class="fas fa-microphone text-6xl mb-3" id="icone-mic"></i>
            <span class="text-2xl font-bold" id="texto-mic">APERTE E FALE</span>
        </button>

        <div id="status" class="mt-8 hidden">
            <div class="flex items-center justify-center text-green-700 font-bold text-xl">
                <i class="fas fa-spinner fa-spin mr-3"></i> O mestre está ouvindo...
            </div>
        </div>
        
        <audio id="player-resposta" class="hidden"></audio>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let arquivoFoto = null;

        const btnGravar = document.getElementById('btn-gravar');
        const statusDiv = document.getElementById('status');
        const textoMic = document.getElementById('texto-mic');
        const playerResposta = document.getElementById('player-resposta');
        const inputCamera = document.getElementById('input-camera');
        const textoFoto = document.getElementById('texto-foto');

        function fotoTirada() {
            if (inputCamera.files.length > 0) {
                arquivoFoto = inputCamera.files[0];
                textoFoto.innerText = "FOTO OK! ✅";
                document.querySelector('label[for="input-camera"]').classList.replace('bg-green-600', 'bg-green-900');
            }
        }

        // Configuração do microfone otimizada
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    enviarDados(audioBlob);
                    audioChunks = [];
                };
            }).catch(err => alert("Ligue o microfone nas configurações!"));

        function iniciarGravacao(e) {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === "inactive") {
                audioChunks = [];
                mediaRecorder.start();
                btnGravar.classList.add('gravando');
                textoMic.innerText = "PODE FALAR...";
            }
        }

        function pararGravacao(e) {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btnGravar.classList.remove('gravando');
                textoMic.innerText = "ENVIANDO...";
            }
        }

        btnGravar.addEventListener('touchstart', iniciarGravacao);
        btnGravar.addEventListener('touchend', pararGravacao);
        btnGravar.addEventListener('mousedown', iniciarGravacao);
        btnGravar.addEventListener('mouseup', pararGravacao);

        async function enviarDados(audioBlob) {
            statusDiv.classList.remove('hidden');
            btnGravar.disabled = true;

            const formData = new FormData();
            formData.append('audio', audioBlob);
            if (arquivoFoto) formData.append('imagem', arquivoFoto);

            try {
                const res = await fetch('/enviar-duvida', { method: 'POST', body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    playerResposta.src = URL.createObjectURL(blob);
                    playerResposta.play();
                } else {
                    alert("Erro no servidor. Tente de novo.");
                }
            } catch (err) {
                alert("Verifique a internet.");
            } finally {
                statusDiv.classList.add('hidden');
                btnGravar.disabled = false;
                textoMic.innerText = "APERTE E FALE";
                textoFoto.innerText = "TIRAR FOTO";
                document.querySelector('label[for="input-camera"]').classList.replace('bg-green-900', 'bg-green-600');
                arquivoFoto = null;
            }
        }
    </script>
</body>
</html>
